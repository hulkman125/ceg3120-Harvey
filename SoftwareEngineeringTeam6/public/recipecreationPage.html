<script>
	$(document).ready(function() {	
		const username = localStorage.getItem("username");

if (username) {
    document.getElementById("username").textContent = "Username: " + username;
    window.currentUser = username;
} else {
    window.location.href = "index.html"; // not logged in
}

		

		const headingElement = document.getElementById("username");
		document.getElementById("username").textContent = "Username:  " + username + "";
		window.currentUser = username;

		let selectedFile = null;

// switch between file and URL
$("#imageSource").change(function () {
    const mode = $(this).val();

    if (mode === "file") {
        $("#fileUploadSection").show();
        $("#urlSection").hide();
    } else {
        $("#fileUploadSection").hide();
        $("#urlSection").show();
    }
});

// file picker
$("#dropZone").click(function () {
    $("#imageFile").click();
});

$("#imageFile").change(function (e) {
    selectedFile = e.target.files[0];
});

$("#signout").click(function(e){
			e.preventDefault();
			window.location.href = "index.html";
		});

// drag/drop support
$("#dropZone").on("dragover", function (e) {
    e.preventDefault();
});

$("#dropZone").on("drop", function (e) {
    e.preventDefault();
    selectedFile = e.originalEvent.dataTransfer.files[0];
});





		$("#index").click(function(e){
			e.preventDefault(); 
			window.location.href = "index.html";
		});
		$("#accountPage").click(function(e){
			e.preventDefault(); 
			window.location.href = "accountPage.html?username=" + encodeURIComponent(window.currentUser);
		});
		$("#createRecipe").click(function(e){
			e.preventDefault(); 
			window.location.href = "recipecreationPage.html?username=" + encodeURIComponent(window.currentUser);
		});
		$("#pantryPage").click(function(e){
			e.preventDefault(); 
			window.location.href = "pantry.html?username=" + encodeURIComponent(window.currentUser);
		});
		$("#foodPage").click(function(e){
			e.preventDefault(); 
			window.location.href = "recipecreationPage.html?username=" + encodeURIComponent(window.currentUser);
		});
		$("#groceriesPage").click(function(e){
			e.preventDefault(); 
			window.location.href = "groceryPage.html?username=" + encodeURIComponent(window.currentUser);
		});	
		//$("#username").text(username);
		$("#SubmitRecipe").click(function (e) {
    e.preventDefault();

    console.log("BUTTON CLICKED");

    const formData = new FormData();

    formData.append("title", $("#title").val());
    formData.append("username", localStorage.getItem("username"));
    formData.append("description", $("#Desc").val());
    formData.append("visibility", $("input[name='Visibility']:checked").val());
    formData.append("servingSize", $("#ServingSize").val());
    formData.append("prepTime", $("#PrepTime").val());
    formData.append("cookTime", $("#CookTime").val());
    formData.append("instructions", $("#tx").val());

    // ✅ THIS IS THE IMPORTANT LINE
    const ingredients = $("#IN").val();
    console.log("INGREDIENTS FROM INPUT:", ingredients);

    formData.append("ingredients", ingredients);

    const imageSource = $("#imageSource").val();

    if (imageSource === "file" && selectedFile) {
        formData.append("image", selectedFile);
    }

    if (imageSource === "url") {
        formData.append("imageUrl", $("#imageURL").val());
    }
		console.log("FINAL FORM DATA INGREDIENTS:", formData.get("ingredients"));
    $.ajax({
    url: "http://localhost:3004/recipes",
    type: "POST",
    data: formData,
    processData: false,
    contentType: false,
    success: function(res) {
        console.log("SUCCESS:", res);
    },
    error: function(err) {
        console.log("ERROR:", err.responseText);
    }
});

	});
});
</script>
