<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
	$(document).ready(function(){

    $("#btn").click(function(e){
        e.preventDefault();

        const username = $("#UN").val().trim();
        const role = $("#RL").val();
        const password = $("#PW").val();
        const repassword = $("#RPW").val();

        if(!username || !role || !password || !repassword){
            alert("Please fill out all fields");
            return;
        }

        if(password !== repassword){
            alert("Passwords do not match");
            return;
        }

        const allowedRoles = ["user", "administrator", "grocery_admin"];
        const normalizedRole = role.trim().toLowerCase();

        if (!allowedRoles.includes(normalizedRole)) {
            alert("Invalid role. Must be user, administrator, or grocery_admin");
            return;
        }

		const usernameRegex = /^[a-z]{8}$/;

const passwordRegex =
/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{12,}$/;

// USERNAME RULE
if (!usernameRegex.test(username)) {
	alert("Username must be exactly 8 lowercase letters");
			return;
		}

// PASSWORD RULE
if (!passwordRegex.test(password)) {
    alert("Password must be at least 12 characters and include uppercase, lowercase, number, and symbol");
		return;
}

        $.ajax({
            url: 'http://localhost:3001/signup',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                username: username,
                role: normalizedRole,
                password: password
            }),
            success: function(response){
                const username = $("#UN").val().trim();

				//overwrite any previous username that was used earlier
    			localStorage.setItem("username", username);
				window.location.href = "groceryPage.html";
            },
            error: function(xhr){
    const msg = xhr.responseJSON?.message || "Signup failed";
    			alert(msg);
			}
        });
    });
});


</script>
